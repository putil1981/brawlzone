<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>BRAWL ZONE</title><link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#1a0a2e;overflow:hidden;font-family:'Nunito',sans-serif;touch-action:none}#mainMenu{position:fixed;inset:0;z-index:100;background:radial-gradient(ellipse at 50% 30%,#3d1a6e 0%,#1a0a2e 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px}.logo{font-family:'Fredoka One',cursive;font-size:clamp(48px,10vw,96px);color:#fff;text-shadow:0 0 30px #ff6b35,0 4px 0 #c2410c,0 8px 0 #7c2d12;letter-spacing:4px;animation:lp 2s ease-in-out infinite}@keyframes lp{0%,100%{transform:scale(1) rotate(-1deg)}50%{transform:scale(1.05) rotate(1deg)}}.subtitle{color:#fbbf24;font-size:20px;font-weight:900;letter-spacing:2px;margin-top:-16px}.menuModes{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:700px}.modeCard{background:linear-gradient(135deg,#2d1b69,#1e1040);border:3px solid rgba(255,255,255,.15);border-radius:20px;padding:20px 28px;cursor:pointer;transition:all .2s;text-align:center;min-width:160px}.modeCard:hover{transform:translateY(-4px);border-color:rgba(255,255,255,.4)}.modeIcon{font-size:36px;margin-bottom:8px}.modeName{color:#fff;font-size:16px;font-weight:900}.modeDesc{color:#a78bfa;font-size:12px;margin-top:4px}.startBtn{background:linear-gradient(135deg,#f97316,#dc2626);color:#fff;border:none;border-radius:50px;padding:18px 56px;font-size:22px;font-weight:900;font-family:'Fredoka One',cursive;cursor:pointer;box-shadow:0 8px 32px rgba(249,115,22,.5);text-transform:uppercase}.selectedMode{border-color:#f97316!important;box-shadow:0 0 20px rgba(249,115,22,.4)}#gameCanvas{display:block}#hud{position:fixed;inset:0;pointer-events:none;z-index:10;display:none}.hudTop{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px}.hudBox{background:rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:8px 16px;backdrop-filter:blur(8px)}.hudTimer{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);border:2px solid #fbbf24;border-radius:50px;padding:6px 20px;color:#fbbf24;font-size:24px;font-weight:900;font-family:'Fredoka One',cursive}.hudScore{color:#fff;font-size:14px;font-weight:900}.hudScore span{color:#fbbf24;font-size:20px}.hudMode{color:#a78bfa;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px}#joystickLeft{position:fixed;bottom:30px;left:30px;pointer-events:all;z-index:20;display:none}.joyOuter{width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.08);border:3px solid rgba(255,255,255,.2);position:relative}.joyInner{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.4);border:3px solid rgba(255,255,255,.7);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}#playerHP{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:20;display:none;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px}.hpBar{width:200px;height:14px;background:rgba(0,0,0,.5);border-radius:20px;border:2px solid rgba(255,255,255,.2);overflow:hidden}.hpFill{height:100%;background:linear-gradient(90deg,#22c55e,#86efac);border-radius:20px;transition:width .2s}.superBar{width:200px;height:8px;background:rgba(0,0,0,.5);border-radius:20px;overflow:hidden}.superFill{height:100%;background:linear-gradient(90deg,#eab308,#fde047);border-radius:20px;transition:width .3s}.crystalCount{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:20;display:none;pointer-events:none;color:#a855f7;font-size:18px;font-weight:900;background:rgba(0,0,0,.6);padding:6px 16px;border-radius:50px;border:2px solid #a855f7}#gameOver{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;backdrop-filter:blur(8px)}.goTitle{font-family:'Fredoka One',cursive;font-size:clamp(48px,10vw,80px)}.goStats{color:#e2e8f0;font-size:18px;text-align:center;line-height:1.8}.goStats b{color:#fbbf24}.replayBtn{background:linear-gradient(135deg,#7c3aed,#4c1d95);color:#fff;border:none;border-radius:50px;padding:16px 48px;font-size:20px;font-weight:900;font-family:'Fredoka One',cursive;cursor:pointer;margin-top:8px}.menuBtn{background:transparent;color:#a78bfa;border:2px solid #a78bfa;border-radius:50px;padding:12px 40px;font-size:16px;font-weight:700;cursor:pointer}#killFeed{position:fixed;top:80px;right:12px;z-index:15;pointer-events:none;display:flex;flex-direction:column;gap:4px;max-width:200px}.killMsg{background:rgba(0,0,0,.7);border-radius:8px;padding:4px 10px;font-size:12px;color:#fff;font-weight:700;border-left:3px solid #f97316}.particle{position:fixed;pointer-events:none;z-index:50;border-radius:50%;animation:pf .6s forwards}@keyframes pf{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}.floatText{position:fixed;pointer-events:none;z-index:60;font-weight:900;font-size:20px;animation:fu 1s forwards}@keyframes fu{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}</style></head><body>
<div id="mainMenu"><div class="logo">BRAWL ZONE</div><div class="subtitle">⚡ РОССИЙСКИЙ АНАЛОГ ⚡</div><div class="menuModes"><div class="modeCard selectedMode" onclick="selectMode('showdown')" id="mode_showdown"><div class="modeIcon">💀</div><div class="modeName">SHOWDOWN</div><div class="modeDesc">Один против всех</div></div><div class="modeCard" onclick="selectMode('brawl3v3')" id="mode_brawl3v3"><div class="modeIcon">⚔️</div><div class="modeName">3 vs 3</div><div class="modeDesc">Командный бой</div></div><div class="modeCard" onclick="selectMode('crystals')" id="mode_crystals"><div class="modeIcon">💎</div><div class="modeName">КРИСТАЛЛЫ</div><div class="modeDesc">Захват ресурсов</div></div></div><button class="startBtn" onclick="startGame()">🔥 ИГРАТЬ!</button></div>
<canvas id="gameCanvas"></canvas>
<div id="hud"><div class="hudTop"><div class="hudBox"><div class="hudMode" id="hudModeName">SHOWDOWN</div><div class="hudScore">Счёт: <span id="hudScore">0</span></div></div><div class="hudTimer" id="hudTimer">3:00</div><div class="hudBox"><div class="hudScore">Живых: <span id="hudAlive">10</span></div><div class="hudScore" style="color:#f97316">Убийств: <span id="hudKills">0</span></div></div></div></div>
<div id="playerHP"><div style="display:flex;gap:8px;align-items:center"><div class="hpBar"><div class="hpFill" id="hpFill"></div></div><span style="color:#22c55e;font-size:12px;font-weight:900" id="hpText">4/4</span></div><div style="display:flex;gap:8px;align-items:center"><div class="superBar"><div class="superFill" id="superFill"></div></div><span style="color:#eab308;font-size:10px;font-weight:700">СУПЕР</span></div></div>
<div class="crystalCount" id="crystalCount">💎 0</div>
<div id="joystickLeft"><div class="joyOuter"><div class="joyInner" id="joyLeftInner"></div></div></div>
<div id="fireBtn" style="position:fixed;bottom:25px;right:20px;width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#ef4444,#991b1b);border:4px solid rgba(255,255,255,.6);display:none;align-items:center;justify-content:center;flex-direction:column;gap:2px;z-index:30;pointer-events:all;box-shadow:0 6px 30px rgba(239,68,68,.8);-webkit-tap-highlight-color:transparent;">🔫<span style="font-size:12px;color:#fff;font-weight:900;">ОГОНЬ</span></div>
<div id="superBtn" style="position:fixed;bottom:145px;right:25px;width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#eab308,#92400e);border:3px solid rgba(255,255,255,.3);display:none;align-items:center;justify-content:center;flex-direction:column;gap:1px;z-index:30;pointer-events:all;opacity:.4;-webkit-tap-highlight-color:transparent;">⚡<span style="font-size:9px;color:#fff;font-weight:900;">СУПЕР</span></div>
<div id="killFeed"></div>
<div id="gameOver"><div class="goTitle" id="goTitle" style="color:#f97316">ИГРА ОКОНЧЕНА</div><div class="goStats" id="goStats"></div><button class="replayBtn" onclick="startGame()">🔄 ЕЩЁ РАЗ</button><button class="menuBtn" onclick="showMenu()">← МЕНЮ</button></div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const TILE=64,MAP_W=25,MAP_H=18;
let W,H,camX=0,camY=0,currentMode='showdown',gameRunning=false,animFrame,gameTime=180,timerInterval,kills=0,score=0,crystals=0;
const keys={};let mouseX=0,mouseY=0,isMobile=false,joyLX=0,joyLY=0;
const BR=[{name:'Огник',color:'#f97316',weapon:'shotgun',hp:4,speed:3.2},{name:'Стрела',color:'#06b6d4',weapon:'sniper',hp:3,speed:3.8},{name:'Бомба',color:'#8b5cf6',weapon:'bomb',hp:5,speed:2.8},{name:'Пуля',color:'#22c55e',weapon:'pistol',hp:3,speed:4.0},{name:'Громила',color:'#ef4444',weapon:'shotgun',hp:6,speed:2.5},{name:'Искра',color:'#eab308',weapon:'laser',hp:3,speed:3.5},{name:'Тень',color:'#6366f1',weapon:'pistol',hp:4,speed:3.6},{name:'Рокет',color:'#f43f5e',weapon:'rocket',hp:4,speed:3.0}];
let mapTiles=[],crystalSpawns=[],crystalObjs=[],player=null,bots=[],bullets=[],explosions=[];
function genMap(){mapTiles=[];crystalSpawns=[];for(let y=0;y<MAP_H;y++){mapTiles[y]=[];for(let x=0;x<MAP_W;x++){if(x===0||y===0||x===MAP_W-1||y===MAP_H-1){mapTiles[y][x]=1;continue;}const r=Math.random();mapTiles[y][x]=r<.1?1:r<.16?2:0;}}for(let y=7;y<11;y++)for(let x=10;x<15;x++)mapTiles[y][x]=0;crystalSpawns=[{x:12,y:9},{x:8,y:6},{x:16,y:12},{x:5,y:11},{x:19,y:6}];spawnCrystals();}
function spawnCrystals(){crystalObjs=crystalSpawns.map(s=>({x:s.x*TILE+TILE/2,y:s.y*TILE+TILE/2,alive:true}));}
function isSolid(tx,ty){if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H)return true;return mapTiles[Math.floor(ty)][Math.floor(tx)]===1;}
function isBush(tx,ty){if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H)return false;return mapTiles[Math.floor(ty)][Math.floor(tx)]===2;}
function mkPlayer(){const b=BR[0];return{x:12*TILE+32,y:9*TILE+32,hp:b.hp,maxHp:b.hp,brawler:b,angle:0,shootCooldown:0,superCharge:0,crystals:0,team:0,alive:true,name:'ТЫ',inBush:false,invul:0};}
function mkBot(idx,team){const b=BR[1+idx%(BR.length-1)];let px,py;do{px=(2+Math.floor(Math.random()*(MAP_W-4)))*TILE+32;py=(2+Math.floor(Math.random()*(MAP_H-4)))*TILE+32;}while(isSolid(px/TILE,py/TILE));return{x:px,y:py,hp:b.hp,maxHp:b.hp,brawler:b,angle:0,shootCooldown:0,superCharge:0,crystals:0,team,alive:true,name:b.name+'_'+idx,inBush:false,invul:0,ai:{state:'wander',target:null,wt:0,wa:Math.random()*Math.PI*2,st:0}};}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function moveEnt(e,dx,dy){const r=18;let nx=e.x+dx;if(!isSolid((nx+r)/TILE,e.y/TILE)&&!isSolid((nx-r)/TILE,e.y/TILE)&&!isSolid(nx/TILE,(e.y+r)/TILE)&&!isSolid(nx/TILE,(e.y-r)/TILE))e.x=nx;let my=e.y+dy;if(!isSolid((e.x+r)/TILE,my/TILE)&&!isSolid((e.x-r)/TILE,my/TILE)&&!isSolid(e.x/TILE,(my+r)/TILE)&&!isSolid(e.x/TILE,(my-r)/TILE))e.y=my;e.x=Math.max(r,Math.min(MAP_W*TILE-r,e.x));e.y=Math.max(r,Math.min(MAP_H*TILE-r,e.y));}
function shoot(owner,tx,ty,sup=false){if(owner.shootCooldown>0&&!sup)return;const w=owner.brawler.weapon,ang=Math.atan2(ty-owner.y,tx-owner.x),spd=sup?9:7,dmg=sup?owner.brawler.hp:1,range=w==='sniper'?900:w==='shotgun'?280:500;if(w==='shotgun'&&!sup){for(let i=-1;i<=1;i++)bullets.push({x:owner.x,y:owner.y,vx:Math.cos(ang+i*.25)*spd,vy:Math.sin(ang+i*.25)*spd,owner,dmg:1,range,traveled:0,color:owner.brawler.color,size:6,sup});owner.shootCooldown=.65;}else if(w==='bomb'&&!sup){bullets.push({x:owner.x,y:owner.y,vx:Math.cos(ang)*4,vy:Math.sin(ang)*4,owner,dmg:2,range:350,traveled:0,color:'#8b5cf6',size:10,isBomb:true,sup});owner.shootCooldown=1.0;}else if(w==='rocket'){bullets.push({x:owner.x,y:owner.y,vx:Math.cos(ang)*(spd+1),vy:Math.sin(ang)*(spd+1),owner,dmg:2,range:600,traveled:0,color:'#f43f5e',size:9,isRocket:true,sup});owner.shootCooldown=.8;}else{bullets.push({x:owner.x,y:owner.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,owner,dmg,range,traveled:0,color:owner.brawler.color,size:w==='sniper'?5:7,sup});owner.shootCooldown=w==='sniper'?.9:w==='laser'?.25:.45;}if(!sup)owner.superCharge=Math.min(100,owner.superCharge+10);}
function spawnFX(x,y,color,r=40){explosions.push({x,y,color,radius:r,life:1});for(let i=0;i<6;i++){const el=document.createElement('div');el.className='particle';const a=Math.random()*Math.PI*2,d=20+Math.random()*50;el.style.cssText='left:'+(x-camX)+'px;top:'+(y-camY)+'px;width:8px;height:8px;background:'+color+';--tx:'+Math.cos(a)*d+'px;--ty:'+Math.sin(a)*d+'px;';document.body.appendChild(el);setTimeout(()=>el.remove(),700);}}
function floatTxt(x,y,t,c='#fbbf24'){const el=document.createElement('div');el.className='floatText';el.textContent=t;el.style.cssText='left:'+(x-camX-20)+'px;top:'+(y-camY-20)+'px;color:'+c+';';document.body.appendChild(el);setTimeout(()=>el.remove(),1000);}
function dmg(t,d,owner){if(t.invul>0)return;t.hp-=d;t.invul=.15;floatTxt(t.x,t.y,'-'+d,'#ef4444');spawnFX(t.x,t.y,'#fff',20);if(owner)owner.superCharge=Math.min(100,owner.superCharge+8);if(t.hp<=0)kill(t,owner);}
function hitR(x,y,r,owner,d){const ts=currentMode==='brawl3v3'?[player,...bots].filter(e=>e&&e.alive&&e.team!==owner.team):[player,...bots].filter(e=>e&&e.alive&&e!==owner);for(const t of ts)if(dist({x,y},t)<r)dmg(t,d,owner);}
function kill(t,killer){t.alive=false;spawnFX(t.x,t.y,t.brawler.color,60);if(killer===player){kills++;score+=(currentMode==='showdown'?200:100);floatTxt(t.x,t.y,'УБИТ!','#fbbf24');addMsg('Ты убил '+t.name,'#f97316');}else if(t===player){addMsg((killer?killer.name:'???')+' убил тебя','#ef4444');setTimeout(()=>endGame(false),800);}else{addMsg((killer?killer.name:'???')+' убил '+t.name,'#6b7280');score+=50;}if(t.crystals>0&&currentMode==='crystals'){crystalObjs.push({x:t.x,y:t.y,alive:true});t.crystals=0;}}
function updBot(bot,dt){if(!bot.alive)return;const ai=bot.ai;ai.wt-=dt;ai.st-=dt;if(bot.shootCooldown>0)bot.shootCooldown-=dt;if(bot.invul>0)bot.invul-=dt;let target=null,md=999999;const en=currentMode==='brawl3v3'?[player,...bots].filter(e=>e&&e.alive&&e.team!==bot.team):[player,...bots].filter(e=>e&&e.alive&&e!==bot);for(const e of en){const d=dist(bot,e);if(d<md){md=d;target=e;}}if(currentMode==='crystals'){const nc=crystalObjs.find(c=>c.alive&&dist({x:c.x,y:c.y},bot)<TILE*1.5);if(nc){bot.crystals++;nc.alive=false;}}const spd=bot.brawler.speed*60*dt;let mx=0,my=0;if(target&&md<TILE*7){const od=bot.brawler.weapon==='sniper'?TILE*5:TILE*3,ang=Math.atan2(target.y-bot.y,target.x-bot.x);bot.angle=ang;if(md>od+TILE){mx=Math.cos(ang);my=Math.sin(ang);}else if(md<od-TILE){mx=-Math.cos(ang);my=-Math.sin(ang);}else{mx=Math.cos(ang+Math.PI/2)*.5;my=Math.sin(ang+Math.PI/2)*.5;}if(md<TILE*6&&ai.st<=0){shoot(bot,target.x,target.y);ai.st=.3+Math.random()*.5;}if(bot.superCharge>=100&&md<TILE*5){bot.superCharge=0;shoot(bot,target.x,target.y,true);}}else{if(ai.wt<=0){ai.wa=Math.random()*Math.PI*2;ai.wt=1+Math.random()*2;}mx=Math.cos(ai.wa);my=Math.sin(ai.wa);bot.angle=ai.wa;}moveEnt(bot,mx*spd,my*spd);bot.inBush=isBush(bot.x/TILE,bot.y/TILE);}
function updBullets(dt){for(let i=bullets.length-1;i>=0;i--){const b=bullets[i],spd=Math.hypot(b.vx,b.vy);b.x+=b.vx;b.y+=b.vy;b.traveled+=spd;if(isSolid(b.x/TILE,b.y/TILE)||b.traveled>=b.range){if(b.isBomb||b.isRocket){spawnFX(b.x,b.y,b.color,60);hitR(b.x,b.y,70,b.owner,b.dmg);}bullets.splice(i,1);continue;}const ts=currentMode==='brawl3v3'?[player,...bots].filter(e=>e&&e.alive&&e.team!==b.owner.team):[player,...bots].filter(e=>e&&e.alive&&e!==b.owner);for(const t of ts){if(dist({x:b.x,y:b.y},t)<22){if(b.isBomb||b.isRocket){spawnFX(b.x,b.y,b.color,60);hitR(b.x,b.y,70,b.owner,b.dmg);}else dmg(t,b.dmg,b.owner);bullets.splice(i,1);break;}}}}
function updPlayer(dt){if(!player.alive)return;if(player.shootCooldown>0)player.shootCooldown-=dt;if(player.invul>0)player.invul-=dt;const spd=player.brawler.speed*60*dt;let dx=0,dy=0;if(!isMobile){if(keys.KeyW||keys.ArrowUp)dy-=1;if(keys.KeyS||keys.ArrowDown)dy+=1;if(keys.KeyA||keys.ArrowLeft)dx-=1;if(keys.KeyD||keys.ArrowRight)dx+=1;}else{dx=joyLX;dy=joyLY;}if(dx||dy){const l=Math.hypot(dx,dy);moveEnt(player,dx/l*spd,dy/l*spd);}if(!isMobile)player.angle=Math.atan2(mouseY+camY-player.y,mouseX+camX-player.x);player.inBush=isBush(player.x/TILE,player.y/TILE);document.getElementById('hpFill').style.width=(player.hp/player.maxHp*100)+'%';document.getElementById('hpText').textContent=player.hp+'/'+player.maxHp;document.getElementById('superFill').style.width=player.superCharge+'%';document.getElementById('hudScore').textContent=score;document.getElementById('hudKills').textContent=kills;document.getElementById('hudAlive').textContent=[player,...bots].filter(e=>e.alive).length;camX=Math.max(0,Math.min(MAP_W*TILE-W,player.x-W/2));camY=Math.max(0,Math.min(MAP_H*TILE-H,player.y-H/2));}
function updCrystals(){if(!player.alive)return;for(const c of crystalObjs){if(!c.alive)continue;if(dist({x:c.x,y:c.y},player)<28){c.alive=false;player.crystals++;crystals=player.crystals;score+=50;floatTxt(player.x,player.y,'💎+1','#a855f7');document.getElementById('crystalCount').textContent='💎 '+crystals;}}if(crystalObjs.filter(c=>c.alive).length<3)spawnCrystals();}
function drawMap(){const sx=Math.floor(camX/TILE),ex=Math.ceil((camX+W)/TILE)+1,sy=Math.floor(camY/TILE),ey=Math.ceil((camY+H)/TILE)+1;for(let y=Math.max(0,sy);y<Math.min(MAP_H,ey);y++)for(let x=Math.max(0,sx);x<Math.min(MAP_W,ex);x++){const t=mapTiles[y][x],px=x*TILE-camX,py=y*TILE-camY;if(t===1){ctx.fillStyle='#374151';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='#4b5563';ctx.fillRect(px+2,py+2,TILE-4,TILE/3);}else if(t===2){ctx.fillStyle='#14532d';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='#166534';for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(px+8+i*18,py+20,12,0,Math.PI*2);ctx.fill();}}else{ctx.fillStyle=(x+y)%2?'#1a3318':'#1e3a1e';ctx.fillRect(px,py,TILE,TILE);}}}
function drawCrystals(){for(const c of crystalObjs){if(!c.alive)continue;const cx=c.x-camX,cy=c.y-camY;if(cx<-20||cy<-20||cx>W+20||cy>H+20)continue;ctx.save();ctx.translate(cx,cy);ctx.rotate(Math.sin(Date.now()/500)*.2);ctx.fillStyle='#a855f7';ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(10,0);ctx.lineTo(0,14);ctx.lineTo(-10,0);ctx.closePath();ctx.fill();ctx.restore();}}
function drawEnt(e,isP=false){if(!e.alive)return;const ex=e.x-camX,ey=e.y-camY;if(ex<-40||ey<-40||ex>W+40||ey>H+40)return;if(!isP&&e.inBush&&e.team!==player.team)return;ctx.save();ctx.translate(ex,ey);if(e.invul>0&&Math.floor(Date.now()/80)%2===0)ctx.globalAlpha=.4;ctx.fillStyle='rgba(0,0,0,.3)';ctx.beginPath();ctx.ellipse(0,18,16,7,0,0,Math.PI*2);ctx.fill();ctx.rotate(e.angle+Math.PI/2);ctx.fillStyle=e.brawler.color;ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.fill();ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=3;ctx.stroke();ctx.fillStyle='#1f2937';ctx.beginPath();ctx.arc(-7,-8,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7,-8,5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-6,-8,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(8,-8,2.5,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#1f2937';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,5,6,.2,Math.PI-.2);ctx.stroke();ctx.fillStyle='#374151';ctx.fillRect(-4,2,8,16);ctx.restore();if(e.hp<e.maxHp||isP){const bx=ex-18,by=ey-30;ctx.fillStyle='rgba(0,0,0,.6)';ctx.beginPath();ctx.roundRect(bx,by,36,5,3);ctx.fill();ctx.fillStyle=e.hp/e.maxHp>.5?'#22c55e':e.hp/e.maxHp>.25?'#eab308':'#ef4444';ctx.beginPath();ctx.roundRect(bx,by,36*e.hp/e.maxHp,5,3);ctx.fill();}if(isP){ctx.fillStyle='#fbbf24';ctx.font='bold 11px Nunito';ctx.textAlign='center';ctx.fillText('👤 ТЫ',ex,ey-35);}}
function drawBullets(){for(const b of bullets){const bx=b.x-camX,by=b.y-camY;if(bx<-20||by<-20||bx>W+20||by>H+20)continue;ctx.save();ctx.translate(bx,by);ctx.fillStyle=b.color;ctx.shadowColor=b.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(0,0,b.size,0,Math.PI*2);ctx.fill();ctx.restore();}}
function drawExplosions(){for(let i=explosions.length-1;i>=0;i--){const e=explosions[i];e.life-=.08;if(e.life<=0){explosions.splice(i,1);continue;}const ex=e.x-camX,ey=e.y-camY;ctx.save();ctx.globalAlpha=e.life*.7;const g=ctx.createRadialGradient(ex,ey,0,ex,ey,e.radius*(1-e.life+.5));g.addColorStop(0,'#fff');g.addColorStop(.3,e.color);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(ex,ey,e.radius*(1-e.life+.5),0,Math.PI*2);ctx.fill();ctx.restore();}}
function addMsg(t,c='#fff'){const fd=document.getElementById('killFeed'),el=document.createElement('div');el.className='killMsg';el.style.color=c;el.style.borderLeftColor=c;el.textContent=t;fd.appendChild(el);if(fd.children.length>5)fd.removeChild(fd.firstChild);setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),500);},3000);}
let lastT=0;
function loop(ts){if(!gameRunning)return;const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;canvas.width=W;canvas.height=H;ctx.fillStyle='#1a3318';ctx.fillRect(0,0,W,H);drawMap();drawCrystals();updPlayer(dt);for(const b of bots)updBot(b,dt);updBullets(dt);if(currentMode==='crystals')updCrystals();for(const b of bots)drawEnt(b,false);drawEnt(player,true);drawBullets();drawExplosions();if(currentMode==='showdown'&&bots.filter(b=>b.alive).length===0&&player.alive){endGame(true);return;}if(currentMode==='brawl3v3'&&score>=1000){endGame(true);return;}animFrame=requestAnimationFrame(loop);}
function startTimer(){clearInterval(timerInterval);gameTime=currentMode==='showdown'?180:120;timerInterval=setInterval(()=>{gameTime--;const m=Math.floor(gameTime/60),s=gameTime%60;document.getElementById('hudTimer').textContent=m+':'+(s<10?'0':'')+s;if(gameTime<=0)endGame(player&&player.alive);},1000);}
function endGame(win){gameRunning=false;clearInterval(timerInterval);cancelAnimationFrame(animFrame);const go=document.getElementById('gameOver'),ti=document.getElementById('goTitle'),st=document.getElementById('goStats');ti.textContent=win?'🏆 ПОБЕДА!':'💀 ПОРАЖЕНИЕ';ti.style.color=win?'#fbbf24':'#ef4444';st.innerHTML='Убийств: <b>'+kills+'</b><br>Очков: <b>'+score+'</b>'+(currentMode==='crystals'?'<br>Кристаллов: <b>'+crystals+'</b>':'');go.style.display='flex';hideUI();}
function selectMode(m){currentMode=m;document.querySelectorAll('.modeCard').forEach(c=>c.classList.remove('selectedMode'));document.getElementById('mode_'+m).classList.add('selectedMode');}
function startGame(){document.getElementById('gameOver').style.display='none';document.getElementById('mainMenu').style.display='none';kills=0;score=0;crystals=0;genMap();player=mkPlayer();bots=[];if(currentMode==='showdown'){for(let i=0;i<9;i++)bots.push(mkBot(i,1));document.getElementById('hudModeName').textContent='💀 SHOWDOWN';}else if(currentMode==='brawl3v3'){for(let i=0;i<2;i++)bots.push(mkBot(i,0));for(let i=2;i<5;i++)bots.push(mkBot(i,1));player.team=0;document.getElementById('hudModeName').textContent='⚔️ 3 VS 3';}else{for(let i=0;i<6;i++)bots.push(mkBot(i,1));document.getElementById('hudModeName').textContent='💎 КРИСТАЛЛЫ';document.getElementById('crystalCount').style.display='flex';}showUI();startTimer();gameRunning=true;lastT=performance.now();animFrame=requestAnimationFrame(loop);}
function showMenu(){document.getElementById('gameOver').style.display='none';document.getElementById('mainMenu').style.display='flex';hideUI();gameRunning=false;clearInterval(timerInterval);}
function showUI(){document.getElementById('hud').style.display='block';document.getElementById('playerHP').style.display='flex';if(isMobile){document.getElementById('joystickLeft').style.display='block';document.getElementById('fireBtn').style.display='flex';document.getElementById('superBtn').style.display='flex';}}
function hideUI(){document.getElementById('hud').style.display='none';document.getElementById('playerHP').style.display='none';document.getElementById('joystickLeft').style.display='none';document.getElementById('fireBtn').style.display='none';document.getElementById('superBtn').style.display='none';document.getElementById('crystalCount').style.display='none';}
window.addEventListener('keydown',e=>{keys[e.code]=true;});
window.addEventListener('keyup',e=>{keys[e.code]=false;});
window.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
window.addEventListener('mousedown',e=>{if(!gameRunning||!player||!player.alive)return;if(e.button===0)shoot(player,mouseX+camX,mouseY+camY);if(e.button===2&&player.superCharge>=100){player.superCharge=0;shoot(player,mouseX+camX,mouseY+camY,true);}});
window.addEventListener('contextmenu',e=>e.preventDefault());
window.addEventListener('keydown',e=>{if(e.code==='Space'&&gameRunning&&player&&player.alive&&player.superCharge>=100){player.superCharge=0;shoot(player,Math.cos(player.angle)*500+player.x,Math.sin(player.angle)*500+player.y,true);}});
function setupJoy(){const jL=document.getElementById('joystickLeft'),jLI=document.getElementById('joyLeftInner');let active=false,sx=0,sy=0;jL.addEventListener('touchstart',e=>{e.preventDefault();active=true;const t=e.changedTouches[0],r=jL.getBoundingClientRect();sx=r.left+r.width/2;sy=r.top+r.height/2;},{passive:false});jL.addEventListener('touchmove',e=>{e.preventDefault();if(!active)return;const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy,maxR=40,d=Math.min(Math.hypot(dx,dy),maxR),ang=Math.atan2(dy,dx);jLI.style.transform='translate(calc(-50% + '+Math.cos(ang)*d+'px),calc(-50% + '+Math.sin(ang)*d+'px))';const n=d/maxR;joyLX=Math.cos(ang)*n;joyLY=Math.sin(ang)*n;},{passive:false});jL.addEventListener('touchend',e=>{active=false;jLI.style.transform='translate(-50%,-50%)';joyLX=0;joyLY=0;});}
function setupFire(){const fb=document.getElementById('fireBtn'),sb=document.getElementById('superBtn');fb.addEventListener('touchstart',e=>{e.preventDefault();if(!gameRunning||!player||!player.alive)return;shoot(player,player.x+Math.cos(player.angle)*300,player.y+Math.sin(player.angle)*300);fb.style.transform='scale(.92)';},{passive:false});fb.addEventListener('touchend',e=>{e.preventDefault();fb.style.transform='scale(1)';},{passive:false});sb.addEventListener('touchstart',e=>{e.preventDefault();if(!gameRunning||!player||!player.alive||player.superCharge<100)return;player.superCharge=0;shoot(player,player.x+Math.cos(player.angle)*500,player.y+Math.sin(player.angle)*500,true);},{passive:false});setInterval(()=>{if(player)sb.style.opacity=player.superCharge>=100?'1':'.35';},200);}
function resize(){W=window.innerWidth;H=window.innerHeight;canvas.width=W;canvas.height=H;isMobile='ontouchstart' in window||W<900;}
resize();window.addEventListener('resize',resize);setupJoy();setupFire();
</script></body></html>
