<!DOCTYPE html>
<html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>BRAWL ZONE</title><link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet"><style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0520;overflow:hidden;font-family:'Nunito',sans-serif;touch-action:none}

/* ===== ЖИВОЕ МЕНЮ ===== */
#menuCanvas{position:fixed;inset:0;z-index:99;pointer-events:none;}
#mainMenu{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:clamp(8px,3vh,32px);gap:clamp(8px,2vh,16px);overflow:hidden;}
.logoWrap{text-align:center;}
.logoOrn{color:#d97706;font-size:clamp(12px,2.5vw,18px);letter-spacing:10px;opacity:.8;animation:ornPulse 3s ease-in-out infinite;}
@keyframes ornPulse{0%,100%{opacity:.5;letter-spacing:10px}50%{opacity:1;letter-spacing:14px}}
.logo{font-family:'Fredoka One',cursive;font-size:clamp(48px,11vw,96px);color:#fff;letter-spacing:5px;line-height:1;
  text-shadow:0 0 40px #ff6b35,0 0 80px #ff6b3555,0 5px 0 #c2410c,0 10px 0 #7c2d12,0 15px 30px rgba(0,0,0,.5);
  animation:logoBounce 2.5s ease-in-out infinite;}
@keyframes logoBounce{0%,100%{transform:scale(1) rotate(-.5deg);}50%{transform:scale(1.04) rotate(.5deg);text-shadow:0 0 60px #ff6b35,0 0 120px #ff6b3588,0 5px 0 #c2410c,0 10px 0 #7c2d12;}}
.subtitle{color:#fbbf24;font-size:clamp(12px,2.8vw,17px);font-weight:900;letter-spacing:3px;margin-top:-2px;
  animation:subGlow 2s ease-in-out infinite alternate;}
@keyframes subGlow{from{color:#fbbf24;opacity:.8}to{color:#fde68a;opacity:1;text-shadow:0 0 20px #f59e0b;}}

/* Режимы — горизонтальный скролл */
.menuModes{display:flex;gap:10px;padding:4px 16px;overflow-x:auto;max-width:100%;
  scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
.menuModes::-webkit-scrollbar{display:none;}
.modeCard{flex:0 0 auto;width:clamp(130px,36vw,185px);
  background:linear-gradient(145deg,rgba(55,30,110,.97),rgba(28,14,60,.97));
  border:2px solid rgba(255,255,255,.1);border-radius:22px;
  padding:clamp(12px,2.5vw,20px) clamp(10px,2.5vw,16px);
  cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);
  text-align:center;scroll-snap-align:center;
  box-shadow:0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.08);
  position:relative;overflow:hidden;}
.modeCard::after{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.07),transparent 50%);
  opacity:1;}
.modeCard:hover{transform:translateY(-8px) scale(1.06);
  border-color:rgba(255,255,255,.3);
  box-shadow:0 20px 50px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.15);}
.modeCard:active{transform:scale(.94);}
.modeIcon{font-size:clamp(30px,7vw,44px);margin-bottom:6px;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.6));display:block;}
.modeName{color:#fff;font-size:clamp(12px,3vw,16px);font-weight:900;letter-spacing:1px;}
.modeDesc{color:#a78bfa;font-size:clamp(9px,2vw,11px);margin-top:3px;opacity:.8;}
.selectedMode{border-color:#f97316!important;
  box-shadow:0 0 0 1px #f97316,0 0 24px rgba(249,115,22,.6),0 8px 32px rgba(0,0,0,.5)!important;}
.selectedMode .modeName{color:#fbbf24;}
.selectedMode .modeIcon{animation:iconBounce .6s ease-in-out infinite alternate;}
@keyframes iconBounce{from{transform:translateY(0)}to{transform:translateY(-4px)}}

/* Кнопка ИГРАТЬ */
.startBtnWrap{position:relative;}
.startBtnGlow{position:absolute;inset:-16px;border-radius:60px;
  background:radial-gradient(ellipse,rgba(249,115,22,.6),transparent 70%);
  animation:btnGlow 1.4s ease-in-out infinite alternate;filter:blur(10px);}
@keyframes btnGlow{from{opacity:.5;transform:scale(.9)}to{opacity:1;transform:scale(1.1)}}
.startBtn{position:relative;z-index:1;
  background:linear-gradient(135deg,#ff9500,#f97316 40%,#dc2626);
  color:#fff;border:none;border-radius:50px;
  padding:clamp(14px,3vh,20px) clamp(44px,11vw,72px);
  font-size:clamp(20px,5vw,28px);font-weight:900;
  font-family:'Fredoka One',cursive;letter-spacing:4px;
  cursor:pointer;
  box-shadow:0 8px 0 #92400e,0 14px 40px rgba(249,115,22,.7),inset 0 2px 0 rgba(255,255,255,.2);
  transition:all .12s;text-transform:uppercase;border:2px solid rgba(255,200,100,.3);}
.startBtn:hover{transform:translateY(-4px);
  box-shadow:0 12px 0 #92400e,0 20px 50px rgba(249,115,22,.8),inset 0 2px 0 rgba(255,255,255,.3);}
.startBtn:active{transform:translateY(5px);
  box-shadow:0 3px 0 #92400e,0 6px 20px rgba(249,115,22,.5);}

.menuHint{color:rgba(255,255,255,.3);font-size:10px;letter-spacing:1px;text-align:center;}

#gameCanvas{display:block;}
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;display:none;}
.hudTop{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:12px 16px;}
.hudBox{background:rgba(0,0,0,.6);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:8px 16px;backdrop-filter:blur(8px);}
.hudTimer{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);border:2px solid #fbbf24;border-radius:50px;padding:6px 20px;color:#fbbf24;font-size:24px;font-weight:900;font-family:'Fredoka One',cursive;}
.hudScore{color:#fff;font-size:14px;font-weight:900;}.hudScore span{color:#fbbf24;font-size:20px;}
.hudMode{color:#a78bfa;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
#joystickLeft{position:fixed;bottom:30px;left:30px;pointer-events:all;z-index:20;display:none;}
.joyOuter{width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.08);border:3px solid rgba(255,255,255,.2);position:relative;}
.joyInner{width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.4);border:3px solid rgba(255,255,255,.7);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);}
#playerHP{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:20;display:none;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px;}
.hpBar{width:200px;height:14px;background:rgba(0,0,0,.5);border-radius:20px;border:2px solid rgba(255,255,255,.2);overflow:hidden;}
.hpFill{height:100%;background:linear-gradient(90deg,#22c55e,#86efac);border-radius:20px;transition:width .2s;box-shadow:0 0 8px rgba(34,197,94,.6);}
.superBar{width:200px;height:8px;background:rgba(0,0,0,.5);border-radius:20px;border:2px solid rgba(250,204,21,.4);overflow:hidden;}
.superFill{height:100%;background:linear-gradient(90deg,#eab308,#fde047);border-radius:20px;transition:width .3s;box-shadow:0 0 6px rgba(234,179,8,.7);}
.crystalCount{position:fixed;top:70px;left:50%;transform:translateX(-50%);z-index:20;display:none;pointer-events:none;color:#a855f7;font-size:18px;font-weight:900;background:rgba(0,0,0,.6);padding:6px 16px;border-radius:50px;border:2px solid #a855f7;}
#gameOver{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;backdrop-filter:blur(8px);}
.goTitle{font-family:'Fredoka One',cursive;font-size:clamp(48px,10vw,80px);text-shadow:0 4px 20px rgba(0,0,0,.5);}
.goStats{color:#e2e8f0;font-size:18px;text-align:center;line-height:1.8;}.goStats b{color:#fbbf24;}
.replayBtn{background:linear-gradient(135deg,#7c3aed,#4c1d95);color:#fff;border:none;border-radius:50px;padding:16px 48px;font-size:20px;font-weight:900;font-family:'Fredoka One',cursive;cursor:pointer;box-shadow:0 6px 24px rgba(124,58,237,.5);transition:all .15s;margin-top:8px;}
.menuBtn{background:transparent;color:#a78bfa;border:2px solid #a78bfa;border-radius:50px;padding:12px 40px;font-size:16px;font-weight:700;cursor:pointer;}
#killFeed{position:fixed;top:80px;right:12px;z-index:15;pointer-events:none;display:flex;flex-direction:column;gap:4px;max-width:200px;}
.killMsg{background:rgba(0,0,0,.7);border-radius:8px;padding:4px 10px;font-size:12px;color:#fff;font-weight:700;border-left:3px solid #f97316;}
.particle{position:fixed;pointer-events:none;z-index:50;border-radius:50%;animation:pf .6s forwards;}
@keyframes pf{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
.floatText{position:fixed;pointer-events:none;z-index:60;font-weight:900;font-size:20px;animation:fu 1s forwards;text-shadow:0 2px 8px rgba(0,0,0,.8);}
@keyframes fu{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}

/* Выбор бравлера */
#brawlerSelect{position:fixed;inset:0;z-index:150;background:radial-gradient(ellipse at 50% 30%,#3d1a6e 0%,#1a0a2e 70%);display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px;gap:16px;overflow-y:auto;}
.bsTitle{font-family:'Fredoka One',cursive;font-size:clamp(28px,6vw,52px);color:#fff;text-shadow:0 0 20px #f97316;letter-spacing:3px;margin-top:10px;}
.bsSubtitle{color:#a78bfa;font-size:14px;font-weight:700;margin-top:-10px;}
.brawlerGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;width:100%;max-width:700px;}
.brawlerCard{background:linear-gradient(135deg,#2d1b69,#1e1040);border:3px solid rgba(255,255,255,.15);border-radius:16px;padding:16px;cursor:pointer;transition:all .2s;text-align:center;position:relative;overflow:hidden;}
.brawlerCard:hover,.brawlerCard:active{transform:translateY(-4px) scale(1.04);border-color:rgba(255,255,255,.5);}
.brawlerCard.selected{border-color:#f97316!important;box-shadow:0 0 24px rgba(249,115,22,.6);}
.brawlerAvatar{width:70px;height:70px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-size:28px;border:3px solid rgba(255,255,255,.2);position:relative;}
.brawlerCardName{color:#fff;font-size:15px;font-weight:900;letter-spacing:1px;}
.brawlerWeapon{color:#a78bfa;font-size:11px;margin-top:2px;}
.brawlerStats{display:flex;gap:6px;margin-top:8px;justify-content:center;}
.statBar{flex:1;height:4px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
.statFill{height:100%;border-radius:4px;}
.statLabels{display:flex;gap:6px;justify-content:center;margin-top:3px;}
.statLabel{flex:1;font-size:8px;color:#6b7280;text-align:center;}
.bsStartBtn{background:linear-gradient(135deg,#f97316,#dc2626);color:#fff;border:none;border-radius:50px;padding:16px 52px;font-size:20px;font-weight:900;font-family:'Fredoka One',cursive;cursor:pointer;box-shadow:0 6px 24px rgba(249,115,22,.5);text-transform:uppercase;margin-top:8px;margin-bottom:20px;}
.bsBack{background:transparent;color:#a78bfa;border:2px solid #a78bfa;border-radius:50px;padding:10px 32px;font-size:14px;font-weight:700;cursor:pointer;}
</style></head><body>

<canvas id="menuCanvas"></canvas>
<div id="mainMenu">
  <div class="logoWrap">
    <div class="logoOrn">✦ ✦ ✦ ✦ ✦</div>
    <div class="logo">BRAWL ZONE</div>
    <div class="subtitle">⚡ РОССИЙСКИЙ АНАЛОГ ⚡</div>
  </div>

  <div class="menuModes">
    <div class="modeCard selectedMode" onclick="selectMode('showdown')" id="mode_showdown">
      <div class="modeIcon">💀</div>
      <div class="modeName">SHOWDOWN</div>
      <div class="modeDesc">Один против всех</div>
    </div>
    <div class="modeCard" onclick="selectMode('brawl3v3')" id="mode_brawl3v3">
      <div class="modeIcon">⚔️</div>
      <div class="modeName">3 vs 3</div>
      <div class="modeDesc">Командный бой</div>
    </div>
    <div class="modeCard" onclick="selectMode('crystals')" id="mode_crystals">
      <div class="modeIcon">💎</div>
      <div class="modeName">КРИСТАЛЛЫ</div>
      <div class="modeDesc">Захват ресурсов</div>
    </div>
  </div>

  <div class="startBtnWrap">
    <div class="startBtnGlow"></div>
    <button class="startBtn" onclick="showBrawlerSelect()">🔥 ИГРАТЬ!</button>
  </div>
  <div class="menuHint">ПК: WASD + мышь &nbsp;|&nbsp; Мобайл: джойстик</div>
</div>

<div id="brawlerSelect">
  <div class="bsTitle">ВЫБЕРИ БРАВЛЕРА</div>
  <div class="bsSubtitle">Каждый бравлер уникален</div>
  <div class="brawlerGrid" id="brawlerGrid"></div>
  <button class="bsStartBtn" onclick="confirmBrawler()">⚔️ В БОЙ!</button>
  <button class="bsBack" onclick="backToMenu()">← НАЗАД</button>
</div>

<canvas id="gameCanvas"></canvas>
<div id="hud"><div class="hudTop"><div class="hudBox"><div class="hudMode" id="hudModeName">SHOWDOWN</div><div class="hudScore">Счёт: <span id="hudScore">0</span></div></div><div class="hudTimer" id="hudTimer">3:00</div><div class="hudBox"><div class="hudScore">Живых: <span id="hudAlive">10</span></div><div class="hudScore" style="color:#f97316">Убийств: <span id="hudKills">0</span></div></div></div></div>
<div id="playerHP"><div style="display:flex;gap:8px;align-items:center"><div class="hpBar"><div class="hpFill" id="hpFill"></div></div><span style="color:#22c55e;font-size:12px;font-weight:900" id="hpText">4/4</span></div><div style="display:flex;gap:8px;align-items:center"><div class="superBar"><div class="superFill" id="superFill"></div></div><span style="color:#eab308;font-size:10px;font-weight:700">СУПЕР</span></div></div>
<div class="crystalCount" id="crystalCount">💎 0</div>
<div id="joystickLeft"><div class="joyOuter"><div class="joyInner" id="joyLeftInner"></div></div></div>
<div id="fireBtn" style="position:fixed;bottom:25px;right:20px;width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#ef4444,#991b1b);border:4px solid rgba(255,255,255,.6);display:none;align-items:center;justify-content:center;flex-direction:column;gap:2px;z-index:30;pointer-events:all;box-shadow:0 6px 30px rgba(239,68,68,.8);-webkit-tap-highlight-color:transparent;">🔫<span style="font-size:12px;color:#fff;font-weight:900;">ОГОНЬ</span></div>
<div id="superBtn" style="position:fixed;bottom:145px;right:25px;width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#eab308,#92400e);border:3px solid rgba(255,255,255,.3);display:none;align-items:center;justify-content:center;flex-direction:column;gap:1px;z-index:30;pointer-events:all;opacity:.4;-webkit-tap-highlight-color:transparent;">⚡<span style="font-size:9px;color:#fff;font-weight:900;">СУПЕР</span></div>
<div id="killFeed"></div>
<div id="gameOver"><div class="goTitle" id="goTitle" style="color:#f97316">ИГРА ОКОНЧЕНА</div><div class="goStats" id="goStats"></div><button class="replayBtn" onclick="startGameWithBrawler(selectedBrawlerIdx)">🔄 ЕЩЁ РАЗ</button><button class="menuBtn" onclick="showMenu()">← МЕНЮ</button></div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
const TILE=64,MAP_W=25,MAP_H=18;
let W,H,camX=0,camY=0,currentMode='showdown',gameRunning=false,animFrame,gameTime=180,timerInterval,kills=0,score=0,crystals=0;
const keys={};let mouseX=0,mouseY=0,isMobile=false,joyLX=0,joyLY=0;
const BR=[
  {name:'Яга',     color:'#9333ea', color2:'#4a044e', weapon:'poison',  hp:4, speed:3.2, desc:'Ведьма в косухе',    age:0},
  {name:'Леший',   color:'#16a34a', color2:'#14532d', weapon:'shotgun', hp:6, speed:2.6, desc:'Качок из чащи',      rage:0},
  {name:'Кащей',   color:'#1e293b', color2:'#7c3aed', weapon:'sword',   hp:3, speed:3.8, desc:'Ловелас с мечом'},
  {name:'Соловей', color:'#dc2626', color2:'#7f1d1d', weapon:'guitar',  hp:3, speed:3.6, desc:'Рок-певец-убийца'},
  {name:'Факел',   color:'#f97316', color2:'#7c2d12', weapon:'shotgun', hp:4, speed:3.2, desc:'Огненный дух'},
  {name:'Фрост',   color:'#67e8f9', color2:'#0369a1', weapon:'sniper',  hp:3, speed:3.8, desc:'Ледяной голем'},
  {name:'Нова',    color:'#e879f9', color2:'#9333ea', weapon:'laser',   hp:3, speed:3.5, desc:'Звёздная магия'},
  {name:'Турбо',   color:'#fb923c', color2:'#7f1d1d', weapon:'rocket',  hp:4, speed:3.0, desc:'Робот-пилот'},
]
let mapTiles=[],crystalSpawns=[],crystalObjs=[],player=null,bots=[],bullets=[],explosions=[];
function genMap(){mapTiles=[];crystalSpawns=[];for(let y=0;y<MAP_H;y++){mapTiles[y]=[];for(let x=0;x<MAP_W;x++){if(x===0||y===0||x===MAP_W-1||y===MAP_H-1){mapTiles[y][x]=1;continue;}const r=Math.random();mapTiles[y][x]=r<.1?1:r<.16?2:0;}}for(let y=7;y<11;y++)for(let x=10;x<15;x++)mapTiles[y][x]=0;crystalSpawns=[{x:12,y:9},{x:8,y:6},{x:16,y:12},{x:5,y:11},{x:19,y:6}];spawnCrystals();}
function spawnCrystals(){crystalObjs=crystalSpawns.map(s=>({x:s.x*TILE+TILE/2,y:s.y*TILE+TILE/2,alive:true}));}
function isSolid(tx,ty){if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H)return true;return mapTiles[Math.floor(ty)][Math.floor(tx)]===1;}
function isBush(tx,ty){if(tx<0||ty<0||tx>=MAP_W||ty>=MAP_H)return false;return mapTiles[Math.floor(ty)][Math.floor(tx)]===2;}
function mkPlayer(){const b=BR[0];return{x:12*TILE+32,y:9*TILE+32,hp:b.hp,maxHp:b.hp,brawler:b,angle:0,shootCooldown:0,superCharge:0,crystals:0,team:0,alive:true,name:'ТЫ',inBush:false,invul:0};}
function mkBot(idx,team){const b=BR[1+idx%(BR.length-1)];let px,py;do{px=(2+Math.floor(Math.random()*(MAP_W-4)))*TILE+32;py=(2+Math.floor(Math.random()*(MAP_H-4)))*TILE+32;}while(isSolid(px/TILE,py/TILE));return{x:px,y:py,hp:b.hp,maxHp:b.hp,brawler:b,angle:0,shootCooldown:0,superCharge:0,crystals:0,team,alive:true,name:b.name+'_'+idx,inBush:false,invul:0,ai:{state:'wander',target:null,wt:0,wa:Math.random()*Math.PI*2,st:0}};}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function moveEnt(e,dx,dy){const r=18;let nx=e.x+dx;if(!isSolid((nx+r)/TILE,e.y/TILE)&&!isSolid((nx-r)/TILE,e.y/TILE)&&!isSolid(nx/TILE,(e.y+r)/TILE)&&!isSolid(nx/TILE,(e.y-r)/TILE))e.x=nx;let my=e.y+dy;if(!isSolid((e.x+r)/TILE,my/TILE)&&!isSolid((e.x-r)/TILE,my/TILE)&&!isSolid(e.x/TILE,(my+r)/TILE)&&!isSolid(e.x/TILE,(my-r)/TILE))e.y=my;e.x=Math.max(r,Math.min(MAP_W*TILE-r,e.x));e.y=Math.max(r,Math.min(MAP_H*TILE-r,e.y));}
function shoot(owner,tx,ty,sup=false){if(owner.shootCooldown>0&&!sup)return;const w=owner.brawler.weapon,ang=Math.atan2(ty-owner.y,tx-owner.x),spd=sup?9:7,dmg=sup?owner.brawler.hp:1,range=w==='sniper'?900:w==='shotgun'?280:500;if(w==='shotgun'&&!sup){for(let i=-1;i<=1;i++)bullets.push({x:owner.x,y:owner.y,vx:Math.cos(ang+i*.25)*spd,vy:Math.sin(ang+i*.25)*spd,owner,dmg:1,range,traveled:0,color:owner.brawler.color,size:6,sup});owner.shootCooldown=.65;}else if(w==='bomb'&&!sup){bullets.push({x:owner.x,y:owner.y,vx:Math.cos(ang)*4,vy:Math.sin(ang)*4,owner,dmg:2,range:350,traveled:0,color:'#8b5cf6',size:10,isBomb:true,sup});owner.shootCooldown=1.0;}else if(w==='rocket'){bullets.push({x:owner.x,y:owner.y,vx:Math.cos(ang)*(spd+1),vy:Math.sin(ang)*(spd+1),owner,dmg:2,range:600,traveled:0,color:'#f43f5e',size:9,isRocket:true,sup});owner.shootCooldown=.8;}else{bullets.push({x:owner.x,y:owner.y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,owner,dmg,range,traveled:0,color:owner.brawler.color,size:w==='sniper'?5:7,sup});owner.shootCooldown=w==='sniper'?.9:w==='laser'?.25:.45;}if(!sup)owner.superCharge=Math.min(100,owner.superCharge+10);}
function spawnFX(x,y,color,r=40){explosions.push({x,y,color,radius:r,life:1});for(let i=0;i<6;i++){const el=document.createElement('div');el.className='particle';const a=Math.random()*Math.PI*2,d=20+Math.random()*50;el.style.cssText='left:'+(x-camX)+'px;top:'+(y-camY)+'px;width:8px;height:8px;background:'+color+';--tx:'+Math.cos(a)*d+'px;--ty:'+Math.sin(a)*d+'px;';document.body.appendChild(el);setTimeout(()=>el.remove(),700);}}
function floatTxt(x,y,t,c='#fbbf24'){const el=document.createElement('div');el.className='floatText';el.textContent=t;el.style.cssText='left:'+(x-camX-20)+'px;top:'+(y-camY-20)+'px;color:'+c+';';document.body.appendChild(el);setTimeout(()=>el.remove(),1000);}
function dmg(t,d,owner){if(t.invul>0)return;t.hp-=d;t.invul=.15;floatTxt(t.x,t.y,'-'+d,'#ef4444');spawnFX(t.x,t.y,'#fff',20);if(owner)owner.superCharge=Math.min(100,owner.superCharge+8);if(t.hp<=0)kill(t,owner);}
function hitR(x,y,r,owner,d){const ts=currentMode==='brawl3v3'?[player,...bots].filter(e=>e&&e.alive&&e.team!==owner.team):[player,...bots].filter(e=>e&&e.alive&&e!==owner);for(const t of ts)if(dist({x,y},t)<r)dmg(t,d,owner);}
function kill(t,killer){t.alive=false;spawnFX(t.x,t.y,t.brawler.color,60);if(killer===player){kills++;score+=(currentMode==='showdown'?200:100);floatTxt(t.x,t.y,'УБИТ!','#fbbf24');addMsg('Ты убил '+t.name,'#f97316');}else if(t===player){addMsg((killer?killer.name:'???')+' убил тебя','#ef4444');setTimeout(()=>endGame(false),800);}else{addMsg((killer?killer.name:'???')+' убил '+t.name,'#6b7280');score+=50;}if(t.crystals>0&&currentMode==='crystals'){crystalObjs.push({x:t.x,y:t.y,alive:true});t.crystals=0;}}
function updBot(bot,dt){if(!bot.alive)return;const ai=bot.ai;ai.wt-=dt;ai.st-=dt;if(bot.shootCooldown>0)bot.shootCooldown-=dt;if(bot.invul>0)bot.invul-=dt;let target=null,md=999999;const en=currentMode==='brawl3v3'?[player,...bots].filter(e=>e&&e.alive&&e.team!==bot.team):[player,...bots].filter(e=>e&&e.alive&&e!==bot);for(const e of en){const d=dist(bot,e);if(d<md){md=d;target=e;}}if(currentMode==='crystals'){const nc=crystalObjs.find(c=>c.alive&&dist({x:c.x,y:c.y},bot)<TILE*1.5);if(nc){bot.crystals++;nc.alive=false;}}const spd=bot.brawler.speed*60*dt;let mx=0,my=0;if(target&&md<TILE*7){const od=bot.brawler.weapon==='sniper'?TILE*5:TILE*3,ang=Math.atan2(target.y-bot.y,target.x-bot.x);bot.angle=ang;if(md>od+TILE){mx=Math.cos(ang);my=Math.sin(ang);}else if(md<od-TILE){mx=-Math.cos(ang);my=-Math.sin(ang);}else{mx=Math.cos(ang+Math.PI/2)*.5;my=Math.sin(ang+Math.PI/2)*.5;}if(md<TILE*6&&ai.st<=0){shoot(bot,target.x,target.y);ai.st=.3+Math.random()*.5;}if(bot.superCharge>=100&&md<TILE*5){bot.superCharge=0;shoot(bot,target.x,target.y,true);}}else{if(ai.wt<=0){ai.wa=Math.random()*Math.PI*2;ai.wt=1+Math.random()*2;}mx=Math.cos(ai.wa);my=Math.sin(ai.wa);bot.angle=ai.wa;}moveEnt(bot,mx*spd,my*spd);bot.inBush=isBush(bot.x/TILE,bot.y/TILE);}
function updBullets(dt){for(let i=bullets.length-1;i>=0;i--){const b=bullets[i],spd=Math.hypot(b.vx,b.vy);b.x+=b.vx;b.y+=b.vy;b.traveled+=spd;if(isSolid(b.x/TILE,b.y/TILE)||b.traveled>=b.range){if(b.isBomb||b.isRocket){spawnFX(b.x,b.y,b.color,60);hitR(b.x,b.y,70,b.owner,b.dmg);}bullets.splice(i,1);continue;}const ts=currentMode==='brawl3v3'?[player,...bots].filter(e=>e&&e.alive&&e.team!==b.owner.team):[player,...bots].filter(e=>e&&e.alive&&e!==b.owner);for(const t of ts){if(dist({x:b.x,y:b.y},t)<22){if(b.isBomb||b.isRocket){spawnFX(b.x,b.y,b.color,60);hitR(b.x,b.y,70,b.owner,b.dmg);}else dmg(t,b.dmg,b.owner);bullets.splice(i,1);break;}}}}
function updPlayer(dt){if(!player.alive)return;if(player.shootCooldown>0)player.shootCooldown-=dt;if(player.invul>0)player.invul-=dt;const spd=player.brawler.speed*60*dt;let dx=0,dy=0;if(!isMobile){if(keys.KeyW||keys.ArrowUp)dy-=1;if(keys.KeyS||keys.ArrowDown)dy+=1;if(keys.KeyA||keys.ArrowLeft)dx-=1;if(keys.KeyD||keys.ArrowRight)dx+=1;}else{dx=joyLX;dy=joyLY;}if(dx||dy){const l=Math.hypot(dx,dy);moveEnt(player,dx/l*spd,dy/l*spd);}if(!isMobile)player.angle=Math.atan2(mouseY+camY-player.y,mouseX+camX-player.x);
  else if(Math.hypot(joyLX,joyLY)>0.1)player.angle=Math.atan2(joyLY,joyLX);player.inBush=isBush(player.x/TILE,player.y/TILE);document.getElementById('hpFill').style.width=(player.hp/player.maxHp*100)+'%';document.getElementById('hpText').textContent=player.hp+'/'+player.maxHp;document.getElementById('superFill').style.width=player.superCharge+'%';document.getElementById('hudScore').textContent=score;document.getElementById('hudKills').textContent=kills;document.getElementById('hudAlive').textContent=[player,...bots].filter(e=>e.alive).length;camX=Math.max(0,Math.min(MAP_W*TILE-W,player.x-W/2));camY=Math.max(0,Math.min(MAP_H*TILE-H,player.y-H/2));}
function updCrystals(){if(!player.alive)return;for(const c of crystalObjs){if(!c.alive)continue;if(dist({x:c.x,y:c.y},player)<48){c.alive=false;player.crystals++;crystals=player.crystals;score+=50;floatTxt(player.x,player.y,'💎+1','#a855f7');document.getElementById('crystalCount').textContent='💎 '+crystals;}}if(crystalObjs.filter(c=>c.alive).length<3)spawnCrystals();}
function drawMap(){const sx=Math.floor(camX/TILE),ex=Math.ceil((camX+W)/TILE)+1,sy=Math.floor(camY/TILE),ey=Math.ceil((camY+H)/TILE)+1;for(let y=Math.max(0,sy);y<Math.min(MAP_H,ey);y++)for(let x=Math.max(0,sx);x<Math.min(MAP_W,ex);x++){const t=mapTiles[y][x],px=x*TILE-camX,py=y*TILE-camY;if(t===1){ctx.fillStyle='#374151';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='#4b5563';ctx.fillRect(px+2,py+2,TILE-4,TILE/3);}else if(t===2){ctx.fillStyle='#14532d';ctx.fillRect(px,py,TILE,TILE);ctx.fillStyle='#166534';for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(px+8+i*18,py+20,12,0,Math.PI*2);ctx.fill();}}else{ctx.fillStyle=(x+y)%2?'#1a3318':'#1e3a1e';ctx.fillRect(px,py,TILE,TILE);}}}
function drawCrystals(){for(const c of crystalObjs){if(!c.alive)continue;const cx=c.x-camX,cy=c.y-camY;if(cx<-20||cy<-20||cx>W+20||cy>H+20)continue;ctx.save();ctx.translate(cx,cy);ctx.rotate(Math.sin(Date.now()/500)*.2);ctx.fillStyle='#a855f7';ctx.beginPath();ctx.moveTo(0,-14);ctx.lineTo(10,0);ctx.lineTo(0,14);ctx.lineTo(-10,0);ctx.closePath();ctx.fill();ctx.restore();}}
function drawHero(ctx, b, t){
  const c=b.color, c2=b.color2, n=b.name;
  const blink=Math.sin(t*3)>0.97;
  const bob=Math.sin(t*4)*1.5;
  ctx.save();
  ctx.translate(0,bob);

  if(n==='Яга'){
    // Баба Яга — ведьма в косухе
    const age = b.age||0; // 0=молодая, 3=старуха
    // Волосы (становятся седыми с возрастом)
    const hairColor = age<2 ? '#1a1a2e' : age<3 ? '#9ca3af' : '#e5e7eb';
    ctx.fillStyle=hairColor;
    // Длинные волосы
    for(let i=-1;i<=1;i+=2){
      ctx.beginPath();
      ctx.moveTo(i*8,-18);
      ctx.bezierCurveTo(i*16,-10,i*18,8,i*14,22);
      ctx.lineWidth=6;ctx.strokeStyle=hairColor;ctx.stroke();
    }
    // Косуха
    const jacketColor = age<3 ? '#1f2937' : '#4b5563';
    ctx.fillStyle=jacketColor;
    ctx.beginPath();ctx.roundRect(-16,2,32,20,4);ctx.fill();
    // Заклёпки на косухе
    ctx.fillStyle='#fbbf24';
    [-10,0,10].forEach(x=>{ctx.beginPath();ctx.arc(x,6,2,0,Math.PI*2);ctx.fill();});
    // Лицо (меняется с возрастом)
    const skinColor = age===0?'#fde7cc':age===1?'#f5d0a9':age===2?'#d4a473':'#a0785a';
    const faceGrad=ctx.createRadialGradient(-3,-8,2,0,-6,16);
    faceGrad.addColorStop(0,skinColor);faceGrad.addColorStop(1,c2+'88');
    ctx.fillStyle=faceGrad;
    ctx.beginPath();
    if(age>=3){
      // Старуха — вытянутое лицо
      ctx.ellipse(0,-6,12,18,0,0,Math.PI*2);
    } else {
      ctx.ellipse(0,-6,14,17,0,0,Math.PI*2);
    }
    ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1.5;ctx.stroke();
    // Морщины у старой
    if(age>=2){
      ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(-8,-4);ctx.lineTo(-4,-2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(8,-4);ctx.lineTo(4,-2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-6,2);ctx.lineTo(6,2);ctx.stroke();
    }
    // Нос (больше у старой)
    const noseSize = 3+age;
    ctx.fillStyle=skinColor;
    ctx.beginPath();ctx.ellipse(0,0,noseSize,noseSize+1,0,0,Math.PI*2);ctx.fill();
    // Фиолетовый ореол ведьмы
    ctx.fillStyle='rgba(147,51,234,.15)';
    ctx.beginPath();ctx.arc(0,-5,24,0,Math.PI*2);ctx.fill();
    // Звезды вокруг
    for(let i=0;i<5;i++){
      const a=i*Math.PI*2/5+t*1.5,r=22;
      ctx.fillStyle=i%2===0?'#a855f7':'#fbbf24';
      ctx.globalAlpha=.6+Math.sin(t*3+i)*.3;
      ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r,2,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;

  } else if(n==='Леший'){
    // Леший — качок в камуфляже
    const rage = b.rage||0;
    const bodyScale = 1+rage*.2;
    ctx.scale(bodyScale,bodyScale);
    // Камуфляжный комбез
    const camo=['#4ade80','#16a34a','#14532d','#365314'];
    // Торс здоровяка
    ctx.fillStyle='#16a34a';
    ctx.beginPath();ctx.roundRect(-18,-4,36,28,6);ctx.fill();
    // Камуфляжные пятна
    camo.forEach((col,i)=>{
      ctx.fillStyle=col;ctx.globalAlpha=.5;
      ctx.beginPath();
      ctx.ellipse(-10+i*8,-2+Math.sin(i)*6,5+i*2,4,i*.5,0,Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha=1;
    // Голова
    ctx.fillStyle='#a16207';
    ctx.beginPath();ctx.ellipse(0,-14,15,14,0,0,Math.PI*2);ctx.fill();
    // Гилли-шапка (ветки и листья)
    ctx.fillStyle='#14532d';
    for(let i=0;i<8;i++){
      const a=i*Math.PI/4,r=16+Math.sin(i*1.3)*4;
      ctx.beginPath();ctx.ellipse(Math.cos(a)*r,Math.sin(a)*r-14,5,3,a,0,Math.PI*2);ctx.fill();
    }
    // Борода
    ctx.fillStyle='#92400e';
    ctx.beginPath();ctx.ellipse(0,2,10,7,0,0,Math.PI*2);ctx.fill();
    // Мощные руки
    ctx.fillStyle='#16a34a';
    ctx.beginPath();ctx.ellipse(-22,4,7,12,.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(22,4,7,12,-.3,0,Math.PI*2);ctx.fill();
    // Пеньки-помощники (маленькие вокруг)
    if(Math.sin(t)>0){
      for(let i=0;i<3;i++){
        const a=i*Math.PI*2/3+t*.5,r=28;
        ctx.fillStyle='#92400e';
        ctx.beginPath();ctx.ellipse(Math.cos(a)*r,Math.sin(a)*r,5,7,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#4ade80';
        ctx.beginPath();ctx.ellipse(Math.cos(a)*r,Math.sin(a)*r-6,6,3,0,0,Math.PI*2);ctx.fill();
      }
    }

  } else if(n==='Кащей'){
    // Кащей — худощавый ловелас в Бриони
    // Костюм
    ctx.fillStyle='#0f172a';
    ctx.beginPath();ctx.roundRect(-12,0,24,24,3);ctx.fill();
    // Лацканы
    ctx.fillStyle='#1e293b';
    ctx.beginPath();ctx.moveTo(0,2);ctx.lineTo(-10,0);ctx.lineTo(-6,16);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(0,2);ctx.lineTo(10,0);ctx.lineTo(6,16);ctx.closePath();ctx.fill();
    // Галстук LV
    ctx.fillStyle='#b45309';
    ctx.beginPath();ctx.moveTo(-3,2);ctx.lineTo(3,2);ctx.lineTo(2,18);ctx.lineTo(0,20);ctx.lineTo(-2,18);ctx.closePath();ctx.fill();
    // Монограмма LV
    ctx.fillStyle='#fbbf24';ctx.font='bold 6px Arial';ctx.textAlign='center';
    ctx.fillText('LV',0,12);
    // Худощавая голова
    const kGrad=ctx.createLinearGradient(-10,-24,10,-4);
    kGrad.addColorStop(0,'#e2e8f0');kGrad.addColorStop(1,'#94a3b8');
    ctx.fillStyle=kGrad;
    ctx.beginPath();ctx.ellipse(0,-14,10,16,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1.5;ctx.stroke();
    // Острые скулы
    ctx.fillStyle='rgba(0,0,0,.15)';
    ctx.beginPath();ctx.ellipse(-7,-10,4,6,-.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(7,-10,4,6,.3,0,Math.PI*2);ctx.fill();
    // Корона
    ctx.fillStyle='#fbbf24';
    ctx.beginPath();
    ctx.moveTo(-10,-26);ctx.lineTo(-10,-22);ctx.lineTo(-5,-25);ctx.lineTo(0,-22);
    ctx.lineTo(5,-25);ctx.lineTo(10,-22);ctx.lineTo(10,-26);ctx.closePath();ctx.fill();
    // Меч Дарт Вейдера (светящийся)
    const swordGlow=ctx.createLinearGradient(0,8,0,32);
    swordGlow.addColorStop(0,'#7c3aed');swordGlow.addColorStop(1,'#a855f7');
    ctx.fillStyle=swordGlow;ctx.shadowColor='#a855f7';ctx.shadowBlur=15;
    ctx.fillRect(-2.5,8,5,26);
    ctx.shadowBlur=0;
    ctx.fillStyle='#374151';ctx.fillRect(-5,6,10,4);// рукоять

  } else if(n==='Соловей'){
    // Соловей Разбойник — рок-певец
    // Кожаные штаны
    ctx.fillStyle='#1f2937';
    ctx.beginPath();ctx.roundRect(-12,8,24,18,3);ctx.fill();
    // Майка с принтом черепа
    ctx.fillStyle='#7f1d1d';
    ctx.beginPath();ctx.roundRect(-12,-4,24,14,2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='bold 10px Arial';ctx.textAlign='center';
    ctx.fillText('☠',0,5);
    // Голова рокера
    const rGrad=ctx.createRadialGradient(-3,-14,2,0,-12,14);
    rGrad.addColorStop(0,'#fde7cc');rGrad.addColorStop(1,'#f5d0a9');
    ctx.fillStyle=rGrad;
    ctx.beginPath();ctx.ellipse(0,-12,12,14,0,0,Math.PI*2);ctx.fill();
    // Ирокез
    ctx.fillStyle=c;
    ctx.beginPath();ctx.moveTo(-4,-22);ctx.lineTo(0,-34);ctx.lineTo(4,-22);ctx.closePath();ctx.fill();
    // Солнечные очки
    ctx.fillStyle='#111';
    ctx.beginPath();ctx.roundRect(-10,-16,8,5,2);ctx.fill();
    ctx.beginPath();ctx.roundRect(2,-16,8,5,2);ctx.fill();
    ctx.strokeStyle='#374151';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-2,-13.5);ctx.lineTo(2,-13.5);ctx.stroke();
    // Гитара (электро)
    ctx.fillStyle='#dc2626';
    ctx.beginPath();ctx.ellipse(4,16,8,10,.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#b91c1c';
    ctx.beginPath();ctx.ellipse(4,14,5,7,.3,0,Math.PI*2);ctx.fill();
    // Звуковые волны
    ctx.strokeStyle='#fbbf24';ctx.lineWidth=1.5;ctx.globalAlpha=.5+Math.sin(t*8)*.4;
    for(let i=1;i<=3;i++){
      ctx.beginPath();ctx.arc(4,16,10+i*5,.8,2.3);ctx.stroke();
    }
    ctx.globalAlpha=1;
    // Молнии от гитары
    if(Math.sin(t*6)>0.5){
      ctx.strokeStyle='#fde047';ctx.lineWidth=2;ctx.globalAlpha=.8;
      ctx.beginPath();ctx.moveTo(10,12);ctx.lineTo(16,8);ctx.lineTo(13,14);ctx.lineTo(20,10);ctx.stroke();
      ctx.globalAlpha=1;
    }

  } else if(n==='Факел'){
    // Огненный дух
    const grad=ctx.createRadialGradient(0,0,8,0,0,28);
    grad.addColorStop(0,c+'99');grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(0,0,28,0,Math.PI*2);ctx.fill();
    for(let i=-1;i<=1;i++){
      ctx.fillStyle=i===0?'#fff':c2;
      ctx.beginPath();ctx.moveTo(i*8,-14);
      ctx.bezierCurveTo(i*8-4,-22+Math.sin(t*6+i)*3,i*8+4,-26+Math.sin(t*5+i)*3,i*8,-30+Math.sin(t*7+i)*2);
      ctx.bezierCurveTo(i*8+5,-26,i*8+6,-20,i*8,-14);ctx.fill();
    }
    const g2=ctx.createRadialGradient(-4,-4,2,0,0,18);
    g2.addColorStop(0,'#fff');g2.addColorStop(0.3,c);g2.addColorStop(1,'#7c2d12');
    ctx.fillStyle=g2;ctx.beginPath();ctx.arc(0,0,18,0,Math.PI*2);ctx.fill();

  } else if(n==='Фрост'){
    for(let i=0;i<6;i++){
      const a=i*Math.PI/3+t*.5,r=22;
      ctx.fillStyle=i%2===0?c:c2;ctx.globalAlpha=0.5;
      ctx.beginPath();ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
      ctx.lineTo(Math.cos(a+0.3)*(r-8),Math.sin(a+0.3)*(r-8));
      ctx.lineTo(Math.cos(a+0.15)*r*1.2,Math.sin(a+0.15)*r*1.2);
      ctx.closePath();ctx.fill();
    }
    ctx.globalAlpha=1;
    ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(16,0);ctx.lineTo(0,18);ctx.lineTo(-16,0);ctx.closePath();ctx.fill();
    const gl=ctx.createLinearGradient(-16,-20,16,18);
    gl.addColorStop(0,'rgba(255,255,255,.5)');gl.addColorStop(1,'transparent');
    ctx.fillStyle=gl;ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(16,0);ctx.lineTo(0,18);ctx.lineTo(-16,0);ctx.closePath();ctx.fill();
    ctx.strokeStyle=c2;ctx.lineWidth=2.5;ctx.stroke();

  } else if(n==='Нова'){
    const sg=ctx.createRadialGradient(0,0,5,0,0,30);
    sg.addColorStop(0,c+'88');sg.addColorStop(0.5,c2+'44');sg.addColorStop(1,'transparent');
    ctx.fillStyle=sg;ctx.beginPath();ctx.arc(0,0,30,0,Math.PI*2);ctx.fill();
    for(let i=0;i<5;i++){
      const a=i*Math.PI*2/5+t*2,r=20;
      ctx.fillStyle=i%2===0?c:c2;ctx.globalAlpha=0.8;
      ctx.beginPath();ctx.arc(Math.cos(a)*r,Math.sin(a)*r,2+Math.sin(t*4+i),0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    ctx.fillStyle=c;ctx.beginPath();
    for(let i=0;i<10;i++){const a=i*Math.PI/5-Math.PI/2,r=i%2===0?20:10;ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
    ctx.closePath();ctx.fill();

  } else if(n==='Турбо'){
    ctx.fillStyle='#ef4444';
    ctx.beginPath();ctx.moveTo(-12,18);ctx.lineTo(-18,28);ctx.lineTo(-12,24);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(12,18);ctx.lineTo(18,28);ctx.lineTo(12,24);ctx.closePath();ctx.fill();
    const rg=ctx.createLinearGradient(-18,-22,18,20);
    rg.addColorStop(0,'#fed7aa');rg.addColorStop(1,c);
    ctx.fillStyle=rg;ctx.beginPath();ctx.roundRect(-16,-22,32,28,8);ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#0ea5e9';ctx.beginPath();ctx.arc(0,-8,10,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.4)';ctx.beginPath();ctx.arc(-3,-11,5,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#9ca3af';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(0,-30);ctx.stroke();
    ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(0,-30,3,0,Math.PI*2);ctx.fill();
    const flame=ctx.createLinearGradient(0,16,0,32);
    flame.addColorStop(0,'#fbbf24');flame.addColorStop(1,'transparent');
    ctx.fillStyle=flame;ctx.globalAlpha=0.8+Math.sin(t*10)*.2;
    ctx.beginPath();ctx.ellipse(0,22,8,10+Math.sin(t*6)*3,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  // Глаза для всех базовых героев
  if(['Факел','Фрост','Нова','Турбо'].includes(n)){
    const ey=n==='Фрост'?-2:n==='Нова'?-2:n==='Турбо'?-8:-2;
    if(n!=='Турбо'){
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(-5,ey,4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(5,ey,4,0,Math.PI*2);ctx.fill();
      if(blink){
        ctx.fillStyle=c2||'#1f2937';ctx.fillRect(-9,ey-1,8,2.5);ctx.fillRect(1,ey-1,8,2.5);
      } else {
        ctx.fillStyle='#1f2937';
        ctx.beginPath();ctx.arc(-5,ey,2.2,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(5,ey,2.2,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#fff';
        ctx.beginPath();ctx.arc(-4,ey-1,1,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(6,ey-1,1,0,Math.PI*2);ctx.fill();
      }
    }
  }

  // Глаза для русских героев
  if(n==='Яга'){
    const ey=-8;
    const eyeColor = (b.age||0)>=2 ? '#92400e' : '#7c3aed';
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-6,ey,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(6,ey,4,0,Math.PI*2);ctx.fill();
    if(blink){
      ctx.fillStyle=eyeColor;ctx.fillRect(-10,ey-1,8,2.5);ctx.fillRect(2,ey-1,8,2.5);
    } else {
      ctx.fillStyle=eyeColor;
      ctx.beginPath();ctx.arc(-6,ey,2.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(6,ey,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(-5,ey-1,1,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(7,ey-1,1,0,Math.PI*2);ctx.fill();
    }
  }
  if(n==='Леший'){
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-6,-12,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(6,-12,4,0,Math.PI*2);ctx.fill();
    if(blink){
      ctx.fillStyle='#16a34a';ctx.fillRect(-10,-13,8,2.5);ctx.fillRect(2,-13,8,2.5);
    } else {
      ctx.fillStyle='#14532d';
      ctx.beginPath();ctx.arc(-6,-12,2.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(6,-12,2.5,0,Math.PI*2);ctx.fill();
    }
  }
  if(n==='Кащей'){
    ctx.fillStyle='#e2e8f0';
    ctx.beginPath();ctx.arc(-5,-14,3.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(5,-14,3.5,0,Math.PI*2);ctx.fill();
    if(blink){
      ctx.fillStyle='#7c3aed';ctx.fillRect(-8.5,-15,7,2);ctx.fillRect(1.5,-15,7,2);
    } else {
      ctx.fillStyle='#7c3aed';
      ctx.beginPath();ctx.arc(-5,-14,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(5,-14,2,0,Math.PI*2);ctx.fill();
    }
  }
  if(n==='Соловей'){
    // Очки уже нарисованы
  }

  ctx.restore();

  // Оружие
  ctx.save();ctx.translate(0,bob);
  if(n==='Яга'){
    // Метла
    ctx.strokeStyle='#92400e';ctx.lineWidth=4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-3,10);ctx.lineTo(3,30);ctx.stroke();
    ctx.fillStyle='#d97706';
    for(let i=-2;i<=2;i++){
      ctx.beginPath();ctx.moveTo(3,28);ctx.lineTo(3+i*4,38);ctx.lineWidth=2;ctx.strokeStyle='#d97706';ctx.stroke();
    }
    // Фиолетовое зелье капает
    ctx.fillStyle='#a855f7';ctx.globalAlpha=.7;
    ctx.beginPath();ctx.arc(3+Math.sin(t*4)*3,35+Math.sin(t*3)*3,3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  } else if(n==='Леший'){
    // Двустволка
    ctx.fillStyle='#4b5563';ctx.beginPath();ctx.roundRect(-5,10,10,18,2);ctx.fill();
    ctx.fillStyle='#1f2937';ctx.fillRect(-4,26,4,6);ctx.fillRect(1,26,4,6);
    ctx.fillStyle='#6b7280';ctx.fillRect(-3,12,6,12);
  } else if(n==='Кащей'){
    // Световой меч (уже нарисован в теле)
  } else if(n==='Соловей'){
    // Гитара (уже нарисована)
  } else {
    ctx.fillStyle='#374151';ctx.beginPath();ctx.roundRect(-4,12,8,14,3);ctx.fill();
    ctx.fillStyle='#6b7280';ctx.beginPath();ctx.roundRect(-2.5,14,5,10,2);ctx.fill();
    if(b.weapon==='sniper'){ctx.fillStyle='#1f2937';ctx.fillRect(-1.5,24,3,10);}
    else if(b.weapon==='shotgun'){ctx.fillStyle='#1f2937';ctx.fillRect(-5,24,10,5);}
    else if(b.weapon==='rocket'){
      ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(0,28,5,0,Math.PI*2);ctx.fill();
    } else if(b.weapon==='laser'){
      ctx.fillStyle='#e879f9';ctx.fillRect(-1.5,24,3,8);
    }
  }
  ctx.restore();
}

function drawEnt(e,isP=false){
  if(!e.alive)return;
  const ex=e.x-camX,ey=e.y-camY;
  if(ex<-50||ey<-50||ex>W+50||ey>H+50)return;
  if(!isP&&e.inBush&&e.team!==player.team)return;

  const t=Date.now()/1000;

  ctx.save();
  ctx.translate(ex,ey);

  // Тень
  ctx.fillStyle='rgba(0,0,0,.35)';
  ctx.beginPath();ctx.ellipse(0,26,16+Math.sin(t*4)*1,7,0,0,Math.PI*2);ctx.fill();

  // Инвуль мигание
  if(e.invul>0&&Math.floor(Date.now()/80)%2===0)ctx.globalAlpha=.3;

  // Вращаем по углу
  ctx.rotate(e.angle+Math.PI/2);

  // Рисуем героя
  drawHero(ctx, e.brawler, t);

  ctx.restore();

  // HP бар
  if(e.hp<e.maxHp||isP){
    const bw=44,bh=6,bx=ex-bw/2,by=ey-44;
    ctx.fillStyle='rgba(0,0,0,.7)';
    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,3);ctx.fill();
    const hp=e.hp/e.maxHp;
    const hcol=hp>.5?'#22c55e':hp>.25?'#eab308':'#ef4444';
    ctx.fillStyle=hcol;
    ctx.beginPath();ctx.roundRect(bx,by,bw*hp,bh,3);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,3);ctx.stroke();
  }
  // Имя игрока
  if(isP){
    ctx.fillStyle='#fbbf24';
    ctx.font='bold 12px Nunito';
    ctx.textAlign='center';
    ctx.fillText('★ '+e.brawler.name,ex,ey-52);
  }
  // Кристаллы
  if(e.crystals>0){
    ctx.fillStyle='#a855f7';
    ctx.font='bold 11px Nunito';
    ctx.textAlign='center';
    ctx.fillText('💎'+e.crystals,ex,ey-58);
  }
}

function drawBullets(){for(const b of bullets){const bx=b.x-camX,by=b.y-camY;if(bx<-20||by<-20||bx>W+20||by>H+20)continue;ctx.save();ctx.translate(bx,by);ctx.fillStyle=b.color;ctx.shadowColor=b.color;ctx.shadowBlur=10;ctx.beginPath();ctx.arc(0,0,b.size,0,Math.PI*2);ctx.fill();ctx.restore();}}
function drawExplosions(){for(let i=explosions.length-1;i>=0;i--){const e=explosions[i];e.life-=.08;if(e.life<=0){explosions.splice(i,1);continue;}const ex=e.x-camX,ey=e.y-camY;ctx.save();ctx.globalAlpha=e.life*.7;const g=ctx.createRadialGradient(ex,ey,0,ex,ey,e.radius*(1-e.life+.5));g.addColorStop(0,'#fff');g.addColorStop(.3,e.color);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(ex,ey,e.radius*(1-e.life+.5),0,Math.PI*2);ctx.fill();ctx.restore();}}
function addMsg(t,c='#fff'){const fd=document.getElementById('killFeed'),el=document.createElement('div');el.className='killMsg';el.style.color=c;el.style.borderLeftColor=c;el.textContent=t;fd.appendChild(el);if(fd.children.length>5)fd.removeChild(fd.firstChild);setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),500);},3000);}

function setupJoy(){const jL=document.getElementById('joystickLeft'),jLI=document.getElementById('joyLeftInner');let active=false,sx=0,sy=0;jL.addEventListener('touchstart',e=>{e.preventDefault();active=true;const t=e.changedTouches[0],r=jL.getBoundingClientRect();sx=r.left+r.width/2;sy=r.top+r.height/2;},{passive:false});jL.addEventListener('touchmove',e=>{e.preventDefault();if(!active)return;const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy,maxR=40,d=Math.min(Math.hypot(dx,dy),maxR),ang=Math.atan2(dy,dx);jLI.style.transform='translate(calc(-50% + '+Math.cos(ang)*d+'px),calc(-50% + '+Math.sin(ang)*d+'px))';const n=d/maxR;joyLX=Math.cos(ang)*n;joyLY=Math.sin(ang)*n;},{passive:false});jL.addEventListener('touchend',e=>{active=false;jLI.style.transform='translate(-50%,-50%)';joyLX=0;joyLY=0;});}

function initMenuBG(){

  menuHeroes = BR.map((b,i)=>({
    x: Math.random()*menuCanvas.width,
    y: menuCanvas.height*0.6 + Math.random()*menuCanvas.height*0.35,
    angle: Math.random()*Math.PI*2,
    speed: .4+Math.random()*.6,
    brawler: b,
    scale: .45+Math.random()*.2,
    t: Math.random()*10,
  }));
}

function drawMenuBG(ts){
  menuAnimFrame = requestAnimationFrame(drawMenuBG);
  if(document.getElementById('mainMenu').style.display==='none'){return;}

  const t = ts/1000;
  menuCanvas.width = window.innerWidth;
  menuCanvas.height = window.innerHeight;
  const W=menuCanvas.width, H=menuCanvas.height;

  // Фон — глубокий градиент
  const bg = mctx.createRadialGradient(W*.5,H*.3,0,W*.5,H*.5,H);
  bg.addColorStop(0,'#3d1a6e');
  bg.addColorStop(0.4,'#1e0a4e');
  bg.addColorStop(1,'#0a0520');
  mctx.fillStyle=bg;
  mctx.fillRect(0,0,W,H);

  // Звёзды
  mctx.fillStyle='rgba(255,255,255,.6)';
  for(let i=0;i<80;i++){
    const sx=(Math.sin(i*127.1)*0.5+0.5)*W;
    const sy=(Math.sin(i*311.7)*0.5+0.5)*H;
    const sr=.5+Math.sin(t*2+i)*.3;
    mctx.globalAlpha=.3+Math.sin(t*1.5+i*.7)*.3;
    mctx.beginPath();mctx.arc(sx,sy,sr,0,Math.PI*2);mctx.fill();
  }
  mctx.globalAlpha=1;

  // Хохломные узоры — золотые линии по краям
  mctx.strokeStyle='rgba(217,119,6,.15)';
  mctx.lineWidth=1.5;
  for(let i=0;i<6;i++){
    mctx.beginPath();
    mctx.arc(W*.1+i*W*.15, H*.05, 30+i*10, 0, Math.PI*2);
    mctx.stroke();
  }

  // Нижние герои
  for(const h of menuHeroes){
    h.t += .016;
    h.x += Math.cos(h.angle)*h.speed;
    h.y += Math.sin(h.angle)*.15;
    if(h.x<-60) h.x=W+60;
    if(h.x>W+60) h.x=-60;
    if(h.y>H+40) h.y=H*.6;
    if(h.y<H*.55) h.y=H*.7;

    mctx.save();
    mctx.translate(h.x,h.y);
    mctx.scale(h.scale,h.scale);
    mctx.rotate(h.angle+Math.PI/2);
    mctx.globalAlpha=0.35;
    drawHero(mctx, h.brawler, h.t);
    mctx.restore();
  }

  // Частицы
  for(const p of menuParticles){
    p.x+=p.vx; p.y+=p.vy; p.life+=.008;
    if(p.y<-10||p.life>1){ p.y=H+5; p.x=Math.random()*W; p.life=0; }
    mctx.globalAlpha=Math.sin(p.life*Math.PI)*0.7;
    mctx.fillStyle=p.color;
    mctx.beginPath();mctx.arc(p.x,p.y,p.r,0,Math.PI*2);mctx.fill();
  }

  // Мерцающие вспышки
  if(Math.random()<.02){
    const fx=Math.random()*W, fy=Math.random()*H*.5;
    const fg=mctx.createRadialGradient(fx,fy,0,fx,fy,40+Math.random()*40);
    fg.addColorStop(0,'rgba(249,115,22,.3)');
    fg.addColorStop(1,'transparent');
    mctx.fillStyle=fg;
    mctx.beginPath();mctx.arc(fx,fy,80,0,Math.PI*2);mctx.fill();
  }

  mctx.globalAlpha=1;
}

initMenuBG();
requestAnimationFrame(drawMenuBG);

</script></body></html>
